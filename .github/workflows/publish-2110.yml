name: Publish (torch 2.11.x)

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: 'Base version (e.g. "0.0.1")'
        required: true
        type: string

jobs:
  release:
    uses: ./.github/workflows/release-wheels.yml
    with:
      base_version: ${{ inputs.base_version }}
      torch_suffix: "2110"
      torch_version: "2.11.0"
      torch_req: "torch>=2.11,<2.12"
    secrets: inherit
